name: easy_copy_with
description: Code generator for automatic copyWith methods in Dart classes using @CopyWith annotation.
version: 4.0.0
homepage: https://github.com/inoek/easy_copy_with
repository: https://github.com/inoek/easy_copy_with
issue_tracker: https://github.com/inoek/easy_copy_with/issues

environment:
  sdk: ^3.10.0

dependencies:
  # TODO: Replace with `easy_copy_with_annotation: ^1.0.0` before publishing
  easy_copy_with_annotation:
    path: ../easy_copy_with_annotation
  build: ^4.0.0
  source_gen: ^4.0.1
  analyzer: ">=8.1.1 <11.0.0"

dev_dependencies:
  test: ^1.26.3
  build_runner: ^2.10.4
  lints: ^6.0.0
  build_test: ^3.4.0
  source_gen_test: ^1.1.0
  equatable: ^2.0.7

topics:
  - codegen
  - copy-with
  - code-generation
  - annotation
